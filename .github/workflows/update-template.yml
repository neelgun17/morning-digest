name: Sync Template Updates

on:
  schedule:
    - cron: '0 6 * * *'  # Check for template updates daily at 6am UTC
  repository_dispatch:
    types: [template-sync]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PRIVATE_REPO_TOKEN || github.token }}

      - name: Merge template changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add template https://github.com/neelgun17/morning-digest.git || true
          git fetch template main

          BEHIND=$(git rev-list HEAD..template/main --count 2>/dev/null || echo "0")
          if [ "$BEHIND" -eq 0 ]; then
            echo "::notice::Already up to date with template."
            exit 0
          fi

          echo "::notice::Merging $BEHIND commit(s) from template..."
          if git merge template/main --no-edit 2>/dev/null; then
            # Remove workflows that only belong in the template repo
            REMOVED=false
            for f in .github/workflows/notify-downstream.yml; do
              if [ -f "$f" ]; then
                git rm "$f"
                REMOVED=true
              fi
            done
            if [ "$REMOVED" = true ]; then
              git commit -m "Remove template-only workflows"
            fi
            git push
            echo "::notice::Successfully synced template updates."
          else
            echo "::notice::Merge conflict detected, attempting auto-resolve..."
            # For conflicting files, keep the user's version and append any new lines from template
            CONFLICTED=$(git diff --name-only --diff-filter=U)
            RESOLVED=true
            for f in $CONFLICTED; do
              if [ "$f" = ".gitignore" ]; then
                # Combine both versions, deduplicate, and sort
                git show :2:"$f" > /tmp/ours 2>/dev/null || true
                git show :3:"$f" > /tmp/theirs 2>/dev/null || true
                cat /tmp/ours /tmp/theirs | sort -u > "$f"
                git add "$f"
              else
                echo "::error::Cannot auto-resolve conflict in $f"
                RESOLVED=false
              fi
            done
            if [ "$RESOLVED" = false ]; then
              git merge --abort
              echo "::error::Merge conflict — manual sync required. Run: git fetch template && git merge template/main"
              exit 1
            fi
            git commit --no-edit
            git push
            echo "::notice::Successfully synced template updates (with auto-resolved conflicts)."
          fi
