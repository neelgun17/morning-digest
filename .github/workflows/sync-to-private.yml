# Sync template infrastructure to the owner's private repo.
# Requires a repo secret PRIVATE_REPO_TOKEN — a GitHub PAT with repo scope
# that can push to neelgun17/my-morning-digest.

name: Sync to Private Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout template repo
        uses: actions/checkout@v4
        with:
          path: template

      - name: Clone private repo
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/neelgun17/my-morning-digest.git private

      - name: Copy infrastructure files
        run: |
          # Directories
          mkdir -p private/.github/scripts private/.github/workflows private/.github/prompts private/worker private/daily

          # Scripts and prompts (full directory sync)
          rsync -av --delete template/.github/scripts/ private/.github/scripts/
          rsync -av --delete template/.github/prompts/ private/.github/prompts/

          # Specific workflows (not all — private repo may have its own)
          cp template/.github/workflows/email-digest.yml private/.github/workflows/email-digest.yml
          cp template/.github/workflows/sync-template.yml private/.github/workflows/sync-template.yml

          # Worker source (not config)
          cp template/worker/index.js private/worker/index.js

          # Top-level files
          cp template/setup.sh private/setup.sh
          cp template/README.md private/README.md
          cp template/daily/sample-digest.md private/daily/sample-digest.md

          # Template files
          cp template/*.template.* private/ 2>/dev/null || true

      - name: Commit and push if changed
        run: |
          cd private
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Sync infrastructure from template repo"
            git push
          fi
