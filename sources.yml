# Content sources the agent checks alongside web search.
# The agent picks 2-3 feeds per day (not all of them) to stay within time limits.
#
# To add a source manually, add an entry under rss: with these fields:
#   - url: <RSS or Atom feed URL>
#     name: <display name>
#     category: tech | ai | finance | news | intellectual
#
# You can also suggest sources from the digest email using the "Suggest a source" link.

rss:
  # Tech & AI
  - url: https://hnrss.org/best
    name: Hacker News Best
    category: tech
  - url: https://feeds.arstechnica.com/arstechnica/index
    name: Ars Technica
    category: tech
  - url: https://blog.anthropic.com/rss.xml
    name: Anthropic Blog
    category: ai
  - url: https://openai.com/blog/rss.xml
    name: OpenAI Blog
    category: ai
  - url: https://arxiv.org/rss/cs.AI
    name: arXiv AI
    category: ai
  - url: https://spectrum.ieee.org/feeds/topic/artificial-intelligence.rss.xml
    name: IEEE Spectrum AI
    category: ai
  - url: https://twobithistory.org/feed.xml
    name: Two-Bit History
    category: tech

  # Finance & Economy
  - url: https://feeds.bloomberg.com/markets/news.rss
    name: Bloomberg Markets
    category: finance
  - url: https://www.ft.com/rss/home
    name: Financial Times
    category: finance
  - url: https://feeds.feedburner.com/MattLevine
    name: Matt Levine (Bloomberg)
    category: finance

  # World News
  - url: https://rss.nytimes.com/services/xml/rss/nyt/World.xml
    name: NYT World
    category: news
  - url: https://feeds.bbci.co.uk/news/world/rss.xml
    name: BBC World
    category: news
  - url: https://www.aljazeera.com/xml/rss/all.xml
    name: Al Jazeera
    category: news
  - url: https://www.scmp.com/rss/91/feed
    name: South China Morning Post
    category: news

  # Philosophy & Culture
  - url: https://aeon.co/feed.rss
    name: Aeon Essays
    category: intellectual
  - url: https://www.theparisreview.org/blog/feed/
    name: Paris Review Blog
    category: intellectual
  - url: https://nautil.us/feed/
    name: Nautilus
    category: intellectual

apis:
  hackernews:
    top: https://hacker-news.firebaseio.com/v0/topstories.json
    item: https://hacker-news.firebaseio.com/v0/item/{id}.json
    check_count: 30
